name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: macOS / Qt 6.8.3
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: clang_64
          cache: true
          modules: qtbase

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure
