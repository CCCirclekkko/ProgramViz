name: Bug report
description: 报告可复现的问题
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        提交前请确认问题尚未存在，并删除日志中的路径、凭据和私有代码。
  - type: input
    id: version
    attributes:
      label: ProgramViz 版本
      placeholder: v0.1.0 或 commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - macOS
        - Windows
        - Ubuntu/Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请给出最小、可重复的操作步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志、截图或 GIF
      render: text
